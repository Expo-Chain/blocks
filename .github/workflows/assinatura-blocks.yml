name: 🔏 Merge Assinado de Bloco para Main

on:
  push:
    branches:
      - 'feature/**'

jobs:
  merge-assinado:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: ⚙️ Configurar Git
        run: |
          git config --global user.name "ExpoChain CI"
          git config --global user.email "${{ secrets.GPG_KEY_EMAIL }}"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg

      - name: 🔐 Importar chave GPG privada
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: ✅ Assinar e fazer merge na main
        run: |
          git checkout main
          git pull origin main
          git merge --no-ff --signoff -m "🔏 Merge assinado automático de ${GITHUB_REF##*/}"
          git push origin main
        env:
          GIT_COMMITTER_NAME: "ExpoChain CI"
          GIT_COMMITTER_EMAIL: ${{ secrets.GPG_KEY_EMAIL }}
          GPG_TTY: /dev/tty
