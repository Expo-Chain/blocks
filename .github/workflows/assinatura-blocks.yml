name: 🔐 Merge Assinado de Bloco para Main

on:
  push:
    branches:
      - feature/**

jobs:
  assinar-e-mergear:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessário para ver o histórico completo

      - name: 🧪 Configurar Git
        run: |
          git config --global user.name "ExpoChain CI"
          git config --global user.email "${{ secrets.GPG_KEY_EMAIL }}"

      - name: 🔑 Importar chave GPG
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: 🧾 Ativar assinatura de commits
        run: |
          git config --global user.signingkey ${{ secrets.GPG_KEY_ID }}
          git config --global commit.gpgsign true

      - name: 🔀 Fazer merge assinado na main
        run: |
          git checkout main
          git pull origin main
          git merge --no-ff --signoff --gpg-sign HEAD@{1} -m "🔏 Merge assinado automático de ${GITHUB_REF##*/}"
          git push origin main
