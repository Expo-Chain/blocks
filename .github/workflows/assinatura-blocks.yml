name: 🖋️ Assinatura de documento

on:
  push:
    branches:
      - 'feature/**'

jobs:
  merge-assinado:
    name: 🔐 Merge Assinado de Bloco para Main
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 📥 Importar chave GPG privada
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🔐 Definir chave de assinatura
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5)
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          git config --global user.signingkey "$KEY_ID"

      - name: ✅ Assinar e fazer merge na main
        run: |
          git config --global user.name "ExpoChain CI"
          git config --global user.email "${{ secrets.GPG_KEY_EMAIL }}"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg
      
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
      
          git checkout main
          git pull origin main
      
          echo "${{ secrets.GPG_PASSPHRASE }}" | \
          gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
          --detach-sign --output signature.sig HEAD
      
          git -c commit.gpgsign=true \
              -c gpg.program="gpg" \
              -c gpg.openpgp.preset-passphrase="${{ secrets.GPG_PASSPHRASE }}" \
              -c user.signingkey=${{ env.GPG_KEY_ID }} \
              merge --no-ff --signoff --gpg-sign=${{ env.GPG_KEY_ID }} HEAD@{1} -m "🔏 Merge assinado automático de ${GITHUB_REF##*/}"
      
          git push origin main
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
