name: 🔏 Merge Assinado de Bloco para Main

on:
  push:
    branches:
      - 'feature/**'

jobs:
  merge-assinado:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: ⚙️ Configurar Git
        run: |
          git config --global user.name "ExpoChain CI"
          git config --global user.email "${{ secrets.GPG_KEY_EMAIL }}"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo RELOADAGENT | gpg-connect-agent

      - name: 🔐 Importar chave GPG privada
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🔐 Ativar chave para assinatura
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5)
          echo "🔑 Usando chave: $KEY_ID"
          git config --global user.signingkey "$KEY_ID"
        env:
          GPG_TTY: /dev/tty

      - name: ✅ Assinar e fazer merge na main
        run: |
          git checkout main
          git pull origin main
          git merge --no-ff --signoff --gpg-sign HEAD@{1} -m "🔏 Merge assinado automático de ${GITHUB_REF##*/}"
          git push origin main
        env:
          GPG_TTY: /dev/tty
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
