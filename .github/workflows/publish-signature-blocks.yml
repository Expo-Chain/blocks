name: 🔏 Assinatura e merge automático

on:
  push:
    branches:
      - feature/**

jobs:
  merge-assinado:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GH_PAT }}
          set-safe-directory: true

      - name: 🔍 Verificar duplicação no main
        run: |
          git fetch origin main
          # Caminho base
          DATA=$(date -u +"%Y/%m/%d")

          # Arquivos existentes na main
          git fetch origin main
          ARQUIVOS_EXISTENTES=$(git ls-tree --name-only origin/main:commits/signatures/$DATA)

          # Arquivos criados/modificados nesta branch
          ARQUIVOS_BRANCH=$(git diff --name-only origin/main HEAD -- commits/signatures/$DATA)

          echo "🧾 Arquivos novos: $ARQUIVOS_BRANCH"
          echo "🧾 Arquivos main: $ARQUIVOS_EXISTENTES"

          # Verifica duplicação ignorando o timestamp final
          for NOVO_ARQ in $ARQUIVOS_BRANCH; do
            FILENAME=$(basename "$NOVO_ARQ")
            PADRAO=$(echo "$FILENAME" | sed -E 's/doc_([a-zA-Z0-9]+)_([a-zA-Z0-9]+)_[0-9]{6}\.txt/doc_\1_\2/')

            echo "🔍 Procurando duplicata de $PADRAO"

            if echo "$ARQUIVOS_EXISTENTES" | grep -q "$PADRAO"; then
              echo "❌ Conflito detectado: já existe $PADRAO na main"

              # 💥 Deleta a branch para evitar bloqueios futuros
              BRANCH_NAME=$(echo "$GITHUB_REF" | sed 's|refs/heads/||')
              echo "🧹 Limpando branch com conflito: $BRANCH_NAME"
              gh auth login --with-token <<< "${{ secrets.GH_PAT }}"
              gh api -X DELETE "repos/Expo-Chain/blocks/git/refs/heads/$BRANCH_NAME"

              exit 1
            fi
          done

          echo "✅ Nenhum conflito detectado"

      - name: 🔐 Importar chave GPG
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import

          gpgconf --kill gpg-agent
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🛡️ Marcar chave como confiável
        run: |
          KEY_FPR=$(gpg --list-keys --with-colons | grep fpr | head -n 1 | cut -d':' -f10)
          echo -e "5\ny\n" | gpg --command-fd 0 --expert --edit-key $KEY_FPR trust

      - name: 🔑 Definir chave de assinatura
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5)
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          git config --global user.signingkey "$KEY_ID"
        env:
          GPG_TTY: ""

      - name: Exibir assinatura do último commit
        run: git log -1 --show-signature

      - name: 🧪 Diagnóstico da Assinatura
        run: |
          echo "🔑 Verificando chave GPG..."
          gpg --list-secret-keys --keyid-format LONG

          echo "🔍 Commit atual:"
          git log -1 --format='%H %an <%ae>'
          git log --show-signature -1

          echo "📌 Verificando assinatura do commit HEAD:"
          git verify-commit HEAD || echo "⚠️ Assinatura inválida!"

          echo "📬 Verificando email do commit:"
          git log -1 --format='%ae'

      - name: ✅ Assinar e fazer merge na main
        run: |
          git config --global user.name "ExpoChain CI (GitHub Actions)"
          git config --global user.email "joaopaulobiesek@gmail.com"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg

          export GPG_TTY=$(tty)
          export GNUPGHOME="$HOME/.gnupg"

          git checkout main
          git pull origin main

          echo "$GPG_PASSPHRASE" | \
          gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
          --detach-sign -o /dev/null README.md || echo "ignorar assinatura direta"

          git merge --no-ff --signoff --gpg-sign=$GPG_KEY_ID HEAD@{1} -m "🔏 Merge assinado automático de ${GITHUB_REF##*/}"

          git log -1 --show-signature
          git verify-commit HEAD || (echo "❌ Assinatura ainda inválida!" && exit 1)

          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} main
        env:
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
