name: 🔏 Assinatura e merge automático

on:
  push:
    branches:
      - feature/**

jobs:
  merge-assinado:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GH_PAT }}
          set-safe-directory: true

      - name: 🔍 Verificar duplicação no main
        run: |
          git fetch origin main
          DATA=$(date -u +"%Y/%m/%d")
          ARQUIVOS=$(git ls-tree --name-only origin/main:commits/signatures/$DATA)

          echo "Arquivos existentes: $ARQUIVOS"

          # Simulação da identificação dos dados
          DOC_ID=$(echo "${GITHUB_REF##*/}" | cut -d'_' -f2)
          USER_ID=$(echo "${GITHUB_REF##*/}" | cut -d'_' -f3)

          echo "Verificando por doc_${DOC_ID}_${USER_ID} na pasta $DATA"

          if echo "$ARQUIVOS" | grep -q "doc_${DOC_ID}_${USER_ID}"; then
            echo "❌ Já existe um bloco assinado por este usuário neste documento na data de hoje!"
            exit 1
          fi
          
          echo "✅ Nenhum conflito detectado. Continuando..."

      - name: 🔐 Importar chave GPG
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import

          gpgconf --kill gpg-agent
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🔑 Definir chave de assinatura
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5)
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          git config --global user.signingkey "$KEY_ID"
        env:
          GPG_TTY: ""

      - name: ✅ Assinar e fazer merge na main
        run: |
          git config --global user.name "ExpoChain CI"
          git config --global user.email "${{ secrets.GPG_KEY_EMAIL }}"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg

          export GPG_TTY=""
          export GNUPGHOME="$HOME/.gnupg"

          git checkout main
          git pull origin main

          echo "$GPG_PASSPHRASE" | \
          gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
          --detach-sign -o /dev/null README.md || echo "ignorar assinatura direta"

          git -c user.signingkey=$GPG_KEY_ID \
              -c commit.gpgsign=true \
              -c gpg.program="gpg" \
              merge --no-ff --signoff --gpg-sign=$GPG_KEY_ID HEAD@{1} -m "🔏 Merge assinado automático de ${GITHUB_REF##*/}"

          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} main
        env:
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
